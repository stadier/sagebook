name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  webapp:
    name: Webapp typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
      - run: npm run build

  functions:
    name: Edge functions typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x
      - name: deno check
        working-directory: backend/supabase/functions
        run: |
          for f in */index.ts; do
            echo "── checking $f"
            deno check "$f"
          done
